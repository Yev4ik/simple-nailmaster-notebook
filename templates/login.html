{% extends "base.html" %}
{% block title %}Login — NailBook{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <svg width="48" height="48" viewBox="0 0 36 36" fill="none">
                <ellipse cx="18" cy="18" rx="16" ry="18" fill="#F4B8C1"/>
                <path d="M18 6 C14 6, 11 10, 11 16 C11 22, 14 28, 18 30 C22 28, 25 22, 25 16 C25 10, 22 6, 18 6Z" fill="#E8919E" opacity="0.7"/>
                <path d="M18 8 C16 8, 14 11, 14 15 C14 19, 16 23, 18 24 C20 23, 22 19, 22 15 C22 11, 20 8, 18 8Z" fill="#FDE8EC"/>
            </svg>
            <h1>Welcome Back</h1>
            <p>Sign in to your NailBook</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
