{% extends "base.html" %}
{% block title %}Register — NailBook{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <svg width="48" height="48" viewBox="0 0 36 36" fill="none">
                <defs><linearGradient id="regLogoBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F9CDD5"/><stop offset="100%" stop-color="#E8919E"/></linearGradient></defs>
                <rect x="1" y="1" width="34" height="34" rx="10" fill="url(#regLogoBg)"/>
                <rect x="13" y="5" width="10" height="5" rx="1.5" fill="#D4707F"/>
                <rect x="16" y="3" width="4" height="3" rx="1" fill="#B8505F"/>
                <rect x="11.5" y="10" width="13" height="16" rx="4" fill="white" opacity="0.9"/>
                <rect x="11.5" y="10" width="13" height="16" rx="4" stroke="#D4707F" stroke-width="0.6" fill="none"/>
                <path d="M14.5 13 L14.5 22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                <path d="M20 26 Q22 28, 21 31 Q20 33, 18 32 Q16 31, 17 29 Q18 27, 20 26Z" fill="#E8919E" opacity="0.8"/>
                <circle cx="27" cy="8" r="1" fill="white" opacity="0.9"/>
                <path d="M27 6 L27 10 M25 8 L29 8" stroke="white" stroke-width="0.5" opacity="0.7"/>
            </svg>
            <h1>Create Account</h1>
            <p>Join NailBook today</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" value="{{ name|default('', true) }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" value="{{ email|default('', true) }}" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="+380 XX XXX XX XX" value="{{ phone|default('', true) }}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 number, 1 special" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <small class="password-hint">Min 8 characters, at least 1 number and 1 special character</small>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
